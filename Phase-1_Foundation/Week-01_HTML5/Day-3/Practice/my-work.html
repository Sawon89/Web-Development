<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>

<body>
    <center>
        <table border="1">
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Topic</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Day 1</td>
                    <td>Introduction</td>
                    <td>10:00 AM - 12:00 PM</td>
                </tr>
                <tr>
                    <td>Day 2</td>
                    <td>Basic HTML</td>
                    <td>12:00 PM - 2:00 PM</td>
                </tr>
                <tr>
                    <td>Day 3</td>
                    <td>Tables & Forms</td>
                    <td>2:00 PM - 4:00 PM</td>
                </tr>
            </tbody>
        </table>
        <form action="/submit" method="POST">
            <label for="name">Full Name</label><br>
            <input type="text" id="name" placeholder="Enter your name" required><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" placeholder="Enter your email" required><br>

            <label for="password">passward: </label>
            <input type="password" id="password" placeholder="Entaring passward" required><br>

            <label for="age">Age</label><br>
            <input type="number" id="age" placeholder="Enter your age" required><br>

            <label for="city">Your city</label><br>
            <select name="city" id="city">
                <option value="">Dhaka</option>
                <option value="">Khulna</option>
                <option value="">Barishal</option>
                <option value="">Rajshahi</option>
                <option value="">Sylhet</option>
                <option value="">Chattogram</option>
                <option value="">Mymansingh</option>
                <option value="">Rangpur</option>
            </select><br>
            <p>Interested Field:</p>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="interests" value="HTML"><br>
            <label for="css">CSS</label>
            <input type="checkbox" id="css" name="interests" value="CSS"><br>
            <label for="javascript">JavaScript</label>
            <input type="checkbox" id="javascript" name="interests" value="JavaScript"><br>

            <p>Experience Level:</p>
            <label for="beginner">Beginner</label>
            <input type="radio" id="beginner" name="Experience" value="beginner"><br>

            <label for="intermediate">Intermediate</label>
            <input type="radio" id="intermediate" name="Experience" value="intermediate"><br>

            <label for="advanced">Advanced</label>
            <input type="radio" id="advanced" name="Experience" value="advanced"><br>

            <label for="message">message</label><br>

            <textarea name="message" id="message" cols="30" rows="10"></textarea><br>
            <button type="submit">submit</button>

        </form>
    </center>
</body>

</html>
